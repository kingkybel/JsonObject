    <rect x="-105" y="-118" width="210" height="236" rx="18" fill="url(#cardGradient)" fill-opacity="0.20" stroke="#67E8F9" stroke-width="4"/>
    <text x="0" y="-58" text-anchor="middle" font-family="Consolas, Monaco, monospace" font-size="34" font-weight="700" fill="#E0FBFF">{</text>
    <text x="-75" y="-10" font-family="Consolas, Monaco, monospace" font-size="18" fill="#E0FBFF">"id": 42,</text>
    <text x="-75" y="24" font-family="Consolas, Monaco, monospace" font-size="18" fill="#E0FBFF">"name": "json",</text>
    <text x="-75" y="58" font-family="Consolas, Monaco, monospace" font-size="18" fill="#E0FBFF">"ok": true</text>
    <text x="0" y="98" text-anchor="middle" font-family="Consolas, Monaco, monospace" font-size="34" font-weight="700" fill="#E0FBFF">}</text>
