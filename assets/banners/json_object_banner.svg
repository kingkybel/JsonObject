<svg width="1600" height="400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="JsonObject banner">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="55%" stop-color="#13243A"/>
      <stop offset="100%" stop-color="#1B3555"/>
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#30C4D1"/>
      <stop offset="100%" stop-color="#0EA5A3"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="400" fill="url(#bgGradient)"/>
  <circle cx="165" cy="380" r="290" fill="#30C4D1" fill-opacity="0.10"/>
  <circle cx="1450" cy="35" r="180" fill="#FFFFFF" fill-opacity="0.06"/>

  <g transform="translate(110, 172)">
    <text font-family="Segoe UI, Arial, sans-serif" font-size="96" font-weight="700" fill="#F8FAFC">JsonObject</text>
    <text y="72" font-family="Segoe UI, Arial, sans-serif" font-size="34" fill="#A5F3FC">C++23 nested JSON access and mutation library</text>
  </g>

  <g transform="translate(1300, 200)">
